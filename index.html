<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART PLAN PRO</title>

<style>
body{
font-family:Segoe UI,sans-serif;
background:#eefbea;
padding:15px;
}

.header{
text-align:center;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin:20px 0;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card div{
font-size:28px;
font-weight:bold;
color:#1b5e20;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
font-size:14px;
}

th{
background:#2e7d32;
color:white;
}
</style>
</head>

<body>

<div class="header">
<h1>🌿 SMART PLAN PRO</h1>
<p>IoT Plant Monitoring Dashboard</p>
</div>

<div class="cards">
<div class="card"><h3>🌡 Temperature</h3><div id="temp">--</div></div>
<div class="card"><h3>💧 Humidity</h3><div id="hum">--</div></div>
<div class="card"><h3>🌱 Soil Moisture</h3><div id="soil">--</div><p id="soilStatus"></p></div>
<div class="card"><h3>☀ LDR</h3><div id="ldr">--</div><p id="lightStatus"></p></div>
</div>

<button onclick="loadData()">🔄 Refresh Data</button>

<table>
<thead>
<tr>
<th>Time</th>
<th>Temperature</th>
<th>Humidity</th>
<th>Soil Moisture</th>
<th>LDR</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/1FI6jO_OlWWsq-8FaKkjtwUyH-tLTTejBsmB97MBZcpk/gviz/tq?tqx=out:csv";

async function loadData(){

try{

const res = await fetch(sheetURL);
const txt = await res.text();
const rows = txt.trim().split('\n');

let html = "";

// skip header
for(let i = 1; i < rows.length; i++){

let c = rows[i].split(',');

let time = c[0];
let temp = c[1];
let hum = c[2];
let soil = c[3];
let ldr = c[4];

html += `
<tr>
<td>${time}</td>
<td>${temp}</td>
<td>${hum}</td>
<td>${soil}</td>
<td>${ldr}</td>
</tr>`;
}

// table update
document.getElementById("tableData").innerHTML = html;

// latest data (cards)
let latest = rows[rows.length - 1].split(',');

document.getElementById("temp").innerText = latest[1] + " °C";
document.getElementById("hum").innerText = latest[2] + " %";
document.getElementById("soil").innerText = latest[3];
document.getElementById("ldr").innerText = latest[4];

// status
document.getElementById("soilStatus").innerText =
latest[3] < 300 ? "Dry" :
latest[3] < 700 ? "Normal" : "Wet";

document.getElementById("lightStatus").innerText =
latest[4] > 2000 ? "Night" : "Day";

}catch(err){
console.log(err);
alert("Failed to load data!");
}

}

loadData();
setInterval(loadData,10000);

</script>

</body>
</html>
