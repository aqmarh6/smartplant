<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART PLAN PRO</title>

<style>
body{
font-family:Segoe UI,sans-serif;
background:#eefbea;
padding:15px;
}

.header{text-align:center}

.top-row{
display:grid;
grid-template-columns:3fr 1fr;
gap:15px;
margin:20px 0;
}

.time-card{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.15);
font-size:32px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
}

.ldr-card{
background:white;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.ldr-card div{
font-size:22px;
font-weight:bold;
margin-top:5px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin:20px 0;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card div{
font-size:28px;
font-weight:bold;
margin-top:5px;
}

.status{
font-size:14px;
margin-top:5px;
font-weight:bold;
}

.good{color:green;}
.bad{color:red;}
.warn{color:orange;}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
font-size:14px;
}

th{
background:#2e7d32;
color:white;
}
</style>
</head>

<body>

<div class="header">
<h1>🌿 SMART PLAN PRO</h1>
<p>IoT Plant Monitoring Dashboard</p>
</div>

<div class="top-row">

<div class="time-card" id="time"></div>

<div class="ldr-card">
<h3>☀ LDR</h3>
<div id="ldr"></div>
<div id="ldrStatus" class="status"></div>
</div>

</div>

<div class="cards">

<div class="card">
<h3>🌡 Temperature</h3>
<div id="temp"></div>
<div id="tempStatus" class="status"></div>
</div>

<div class="card">
<h3>💧 Humidity</h3>
<div id="hum"></div>
<div id="humStatus" class="status"></div>
</div>

<div class="card">
<h3>🌱 Soil Moisture</h3>
<div id="soil"></div>
<div id="soilStatus" class="status"></div>
</div>

</div>

<button onclick="loadData()">🔄 Refresh Data</button>

<table>
<thead>
<tr>
<th>Time</th>
<th>Temp</th>
<th>Hum</th>
<th>Soil</th>
<th>LDR</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1FI6jO_OlWWsq-8FaKkjtwUyH-tLTTejBsmB97MBZcpk/gviz/tq?tqx=out:csv";

async function loadData(){

const res = await fetch(sheetURL);
const txt = await res.text();
const rows = txt.trim().split('\n');

let html = "";

// table
for(let i = 1; i < rows.length; i++){
let c = rows[i].split(',');

html += `
<tr>
<td>${c[0]}</td>
<td>${c[1]}</td>
<td>${c[2]}</td>
<td>${c[3]}</td>
<td>${c[4]}</td>
</tr>`;
}

document.getElementById("tableData").innerHTML = html;

// latest
let latest = rows[rows.length - 1].split(',');

let time = latest[0];
let temp = Number(latest[1]);
let hum = Number(latest[2]);
let soil = Number(latest[3]);
let ldr = Number(latest[4]);

// DIRECT DISPLAY (NO EMPTY STATE)
document.getElementById("time").innerText = "⏰ " + time;

document.getElementById("ldr").innerText = ldr;
document.getElementById("temp").innerText = temp + " °C";
document.getElementById("hum").innerText = hum + " %";
document.getElementById("soil").innerText = soil;

// LDR STATUS
document.getElementById("ldrStatus").innerText =
ldr > 2000 ? "🌙 Night" : "☀ Bright";
document.getElementById("ldrStatus").className =
ldr > 2000 ? "status warn" : "status good";

// TEMP STATUS
document.getElementById("tempStatus").innerText =
temp > 35 ? "🔥 Hot" : "✅ Normal";
document.getElementById("tempStatus").className =
temp > 35 ? "status bad" : "status good";

// HUM STATUS
document.getElementById("humStatus").innerText =
(hum < 40 || hum > 80) ? "⚠ Bad" : "✅ Good";
document.getElementById("humStatus").className =
(hum < 40 || hum > 80) ? "status bad" : "status good";

// SOIL STATUS
document.getElementById("soilStatus").innerText =
soil < 300 ? "🔴 Dry" : "🟢 OK";
document.getElementById("soilStatus").className =
soil < 300 ? "status bad" : "status good";

}

loadData();
setInterval(loadData,10000);

</script>

</body>
</html>
