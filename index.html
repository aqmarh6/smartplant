<script>
const sheetURL='https://docs.google.com/spreadsheets/d/1FI6jO_OlWWsq-8FaKkjtwUyH-tLTTejBsmB97MBZcpk/export?format=csv&gid=0';

let chart;

async function loadData(){

try{

const res = await fetch(sheetURL);
const txt = await res.text();

const rows = txt
.replace(/\r/g,'')
.trim()
.split('\n')
.filter(row => row.length > 0);

if(rows.length <= 1){
console.log("No data found");
return;
}

const labels = [];
const temps = [];

let html = '';

for(let i=Math.max(1,rows.length-20); i<rows.length; i++){

let c = rows[i]
.replace(/\r/g,'')
.split(',');

if(c.length < 5) continue;

labels.push(c[0]);
temps.push(Number(c[1]));

html += `
<tr>
<td>${c[0]}</td>
<td>${c[1]}</td>
<td>${c[2]}</td>
<td>${c[3]}</td>
<td>${c[4]}</td>
</tr>
`;
}

document.getElementById('tableData').innerHTML = html;

let latest = rows[rows.length-1]
.replace(/\r/g,'')
.split(',');

document.getElementById('temp').innerText =
(latest[1] || 0) + '°C';

document.getElementById('hum').innerText =
(latest[2] || 0) + '%';

document.getElementById('soil').innerText =
(latest[3] || 0);

document.getElementById('ldr').innerText =
(latest[4] || 0);

document.getElementById('soilStatus').innerText =
Number(latest[3]) < 300
? 'Dry'
: Number(latest[3]) < 700
? 'Normal'
: 'Wet';

document.getElementById('lightStatus').innerText =
Number(latest[4]) > 2000
? 'Night'
: 'Day';

if(chart) chart.destroy();

chart = new Chart(
document.getElementById('myChart'),
{
type:'line',
data:{
labels:labels,
datasets:[
{
label:'Temperature',
data:temps,
fill:false,
tension:0.3
}
]
},
options:{
responsive:true,
maintainAspectRatio:true
}
}
);

}catch(error){
console.error("Error loading sheet:", error);
}

}

loadData();
setInterval(loadData,10000);
</script>
