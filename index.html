<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART PLAN PRO</title>

<style>
body{
font-family:Segoe UI,sans-serif;
background:#eefbea;
padding:15px;
}

.header{text-align:center}

.top-row{
display:grid;
grid-template-columns:3fr 1fr;
gap:15px;
margin:20px 0;
}

.time-card{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.15);
font-size:32px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
}

.ldr-card{
background:white;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin:20px 0;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card div{
font-size:28px;
font-weight:bold;
margin-top:5px;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
font-size:14px;
}

th{
background:#2e7d32;
color:white;
}
</style>
</head>

<body>

<div class="header">
<h1>🌿 SMART PLAN PRO</h1>
<p>IoT Plant Monitoring Dashboard</p>
</div>

<!-- TOP -->
<div class="top-row">

<div class="time-card" id="time"></div>

<div class="ldr-card">
<h3>☀ LDR</h3>
<div id="ldr"></div>
</div>

</div>

<!-- CARDS -->
<div class="cards">

<div class="card">
<h3>🌡 Temperature</h3>
<div id="temp"></div>
</div>

<div class="card">
<h3>💧 Humidity</h3>
<div id="hum"></div>
</div>

<div class="card">
<h3>🌱 Soil</h3>
<div id="soil"></div>
</div>

</div>

<button onclick="loadData()">🔄 Refresh Data</button>

<table>
<thead>
<tr>
<th>Time</th>
<th>Temp</th>
<th>Hum</th>
<th>Soil</th>
<th>LDR</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1FI6jO_OlWWsq-8FaKkjtwUyH-tLTTejBsmB97MBZcpk/gviz/tq?tqx=out:csv";

async function loadData(){

const res = await fetch(sheetURL);
const txt = await res.text();
const rows = txt.trim().split('\n');

let html = "";

// TABLE
for(let i = 1; i < rows.length; i++){
let c = rows[i].split(',');

html += `
<tr>
<td>${c[0]}</td>
<td>${c[1]}</td>
<td>${c[2]}</td>
<td>${c[3]}</td>
<td>${c[4]}</td>
</tr>`;
}

document.getElementById("tableData").innerHTML = html;

// LATEST DATA (DIRECT DISPLAY)
let latest = rows[rows.length - 1].split(',');

document.getElementById("time").innerText = latest[0];
document.getElementById("temp").innerText = latest[1];
document.getElementById("hum").innerText = latest[2];
document.getElementById("soil").innerText = latest[3];
document.getElementById("ldr").innerText = latest[4];

}

loadData();
setInterval(loadData,10000);

</script>

</body>
</html>
