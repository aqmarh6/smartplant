<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART PLAN PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Segoe UI,sans-serif;background:#eefbea;padding:15px}
.header{text-align:center}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin:20px 0}
.card{background:white;padding:20px;border-radius:15px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.card div{font-size:32px;font-weight:bold;color:#1b5e20}
button{width:100%;padding:12px;background:#2e7d32;color:white;border:none;border-radius:10px;cursor:pointer}
.chart-box{background:white;padding:15px;margin:20px 0;border-radius:15px}
table{width:100%;border-collapse:collapse;background:white}
th,td{padding:10px;border:1px solid #ddd;text-align:center}
th{background:#2e7d32;color:white}
</style>
</head>
<body>

<div class="header">
<h1>🌿 SMART PLAN PRO</h1>
<p>IoT Plant Monitoring Dashboard</p>
</div>

<div class="cards">
<div class="card"><h3>🌡 Temperature</h3><div id="temp">--</div></div>
<div class="card"><h3>💧 Humidity</h3><div id="hum">--</div></div>
<div class="card"><h3>🌱 Soil Moisture</h3><div id="soil">--</div><p id="soilStatus"></p></div>
<div class="card"><h3>☀ LDR</h3><div id="ldr">--</div><p id="lightStatus"></p></div>
</div>

<button onclick="loadData()">Refresh Data</button>

<div class="chart-box">
<canvas id="myChart"></canvas>
</div>

<table>
<thead>
<tr><th>Time</th><th>Temp</th><th>Humidity</th><th>Soil</th><th>LDR</th></tr>
</thead>
<tbody id="tableData"></tbody>
</table>

<script>
const sheetURL='https://docs.google.com/spreadsheets/d/1FI6jO_OlWWsq-8FaKkjtwUyH-tLTTejBsmB97MBZcpk/gviz/tq?tqx=out:csv';
let chart;

async function loadData(){
const res=await fetch(sheetURL);
const txt=await res.text();
const rows=txt.trim().split('\\n');

const labels=[];
const temps=[];
let html='';

for(let i=Math.max(1,rows.length-20);i<rows.length;i++){
 let c=rows[i].split(',');
 labels.push(c[0]);
 temps.push(Number(c[1]));
 html += `<tr><td>${c[0]}</td><td>${c[1]}</td><td>${c[2]}</td><td>${c[3]}</td><td>${c[4]}</td></tr>`;
}

document.getElementById('tableData').innerHTML=html;

let latest=rows[rows.length-1].split(',');
document.getElementById('temp').innerText=latest[1]+'°C';
document.getElementById('hum').innerText=latest[2]+'%';
document.getElementById('soil').innerText=latest[3];
document.getElementById('ldr').innerText=latest[4];

document.getElementById('soilStatus').innerText =
latest[3] < 300 ? 'Dry' : latest[3] < 700 ? 'Normal' : 'Wet';

document.getElementById('lightStatus').innerText =
latest[4] > 2000 ? 'Night' : 'Day';

if(chart) chart.destroy();
chart=new Chart(document.getElementById('myChart'),{
type:'line',
data:{labels:labels,datasets:[{label:'Temperature',data:temps}]}
});
}

loadData();
setInterval(loadData,10000);
</script>

</body>
</html>
