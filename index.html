<script>
const sheetURL =
'https://docs.google.com/spreadsheets/d/1FI6jO_OlWWsq-8FaKkjtwUyH-tLTTejBsmB97MBZcpk/export?format=csv&gid=0';

let chart;

async function loadData() {

try {

const response = await fetch(sheetURL);
const csv = await response.text();

const rows = csv.trim().split('\n');

if(rows.length < 2) return;

let labels = [];
let tempData = [];
let humData = [];
let soilData = [];
let ldrData = [];

let tableHTML = '';

for(let i=Math.max(1,rows.length-20); i<rows.length; i++){

let col = rows[i].replace(/\r/g,'').split(',');

if(col.length < 5) continue;

let time = col[0];
let temp = Number(col[1]) || 0;
let hum = Number(col[2]) || 0;
let soil = Number(col[3]) || 0;
let ldr = Number(col[4]) || 0;

labels.push(time);
tempData.push(temp);
humData.push(hum);
soilData.push(soil);
ldrData.push(ldr);

tableHTML += `
<tr>
<td>${time}</td>
<td>${temp}</td>
<td>${hum}</td>
<td>${soil}</td>
<td>${ldr}</td>
</tr>
`;
}

document.getElementById("tableData").innerHTML = tableHTML;

let latest = rows[rows.length-1]
.replace(/\r/g,'')
.split(',');

let latestTemp = Number(latest[1]) || 0;
let latestHum = Number(latest[2]) || 0;
let latestSoil = Number(latest[3]) || 0;
let latestLdr = Number(latest[4]) || 0;

document.getElementById("temp").innerHTML =
latestTemp + " °C";

document.getElementById("hum").innerHTML =
latestHum + " %";

document.getElementById("soil").innerHTML =
latestSoil;

document.getElementById("ldr").innerHTML =
latestLdr;

let soilText = "Dry";

if(latestSoil > 1500)
soilText = "Wet";
else if(latestSoil > 500)
soilText = "Normal";

document.getElementById("soilStatus").innerHTML =
soilText;

document.getElementById("lightStatus").innerHTML =
latestLdr > 3000 ? "Dark" : "Bright";

if(chart) chart.destroy();

chart = new Chart(
document.getElementById("myChart"),
{
type:'line',
data:{
labels:labels,
datasets:[
{
label:'Temperature',
data:tempData,
borderWidth:2
},
{
label:'Humidity',
data:humData,
borderWidth:2
},
{
label:'Soil Moisture',
data:soilData,
borderWidth:2
},
{
label:'LDR',
data:ldrData,
borderWidth:2
}
]
},
options:{
responsive:true,
maintainAspectRatio:false
}
}
);

} catch(error){
console.log(error);
}

}

loadData();

setInterval(loadData,5000);
</script>
